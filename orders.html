<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>الطلبات</title>

<style>

body{
font-family:Arial;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
}

th,td{
border:1px solid black;
padding:10px;
}

</style>

</head>

<body>

<h1>الطلبات</h1>

<table>

<tr>
<th>الاسم</th>
<th>الهاتف</th>
<th>العنوان</th>
</tr>

<tbody id="ordersTable"></tbody>

</table>

<script>

let orders=JSON.parse(localStorage.getItem("orders"))||[];

let table=document.getElementById("ordersTable");

orders.forEach(order=>{

let row=`
<tr>
<td>${order.name}</td>
<td>${order.phone}</td>
<td>${order.address}</td>
</tr>
`;

table.innerHTML+=row;

});

</script>

</body>
</html>
